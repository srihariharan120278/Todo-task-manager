<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Task Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0f1f;
    color:white;
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:linear-gradient(135deg,#0c1225,#15152d,#1b1035);
    border-radius:30px;
    padding:40px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
    font-size:60px;
    margin-bottom:10px;
    background:linear-gradient(to right,#fff,#c4b5fd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
}

.tags{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:35px;
}

.tag{
    padding:12px 20px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:35px;
}

.card{
    background:rgba(255,255,255,0.04);
    border-radius:20px;
    padding:25px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.08);
}

.card h2{
    font-size:45px;
}

.total h2{color:#8b5cf6;}
.done h2{color:#00f5d4;}
.pending h2{color:#facc15;}
.expired h2{color:#ff006e;}

.task-box{
    background:rgba(255,255,255,0.04);
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
}

.task-form{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.task-form input{
    flex:1;
    min-width:250px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
}

.task-form button{
    padding:16px 30px;
    border:none;
    border-radius:12px;
    background:#8b5cf6;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.filter-buttons{
    display:flex;
    gap:10px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.filter-buttons button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
}

.filter-buttons button.active{
    background:#8b5cf6;
}

.task-list{
    display:grid;
    gap:20px;
}

.task-item{
    background:rgba(255,255,255,0.04);
    border-radius:20px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.task-info h3{
    margin-bottom:8px;
}

.task-info p{
    color:#94a3b8;
    font-size:14px;
}

.task-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.done-btn{
    background:#00b894;
}

.delete-btn{
    background:#ff006e;
}

.undo-btn{
    background:#f59e0b;
    margin-top:20px;
}

.structure{
    margin-top:35px;
    display:grid;
    gap:20px;
}

.structure-box{
    background:rgba(255,255,255,0.04);
    border-radius:20px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.08);
}

.node{
    display:inline-block;
    padding:10px 15px;
    background:#111827;
    border-radius:10px;
    margin-right:10px;
    margin-top:10px;
    color:#00f5d4;
}

.arrow{
    color:#8b5cf6;
}

@media(max-width:768px){

    h1{
        font-size:40px;
    }

    .task-form{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>Task Manager</h1>

<p class="subtitle">
Linked List + Stack (Undo) + Timer System
</p>

<div class="tags">
<div class="tag">🔗 Linked List</div>
<div class="tag">📦 Stack Undo</div>
<div class="tag">⏱ Timer</div>
<div class="tag">💾 LocalStorage</div>
</div>

<div class="stats">

<div class="card total">
<h2 id="total">0</h2>
<p>TOTAL</p>
</div>

<div class="card done">
<h2 id="done">0</h2>
<p>DONE</p>
</div>

<div class="card pending">
<h2 id="pending">0</h2>
<p>PENDING</p>
</div>

<div class="card expired">
<h2 id="expired">0</h2>
<p>EXPIRED</p>
</div>

</div>

<div class="task-box">

<h3 style="margin-bottom:20px;">// ADD NEW TASK</h3>

<div class="task-form">

<input type="text" id="taskInput" placeholder="Enter task description">

<input type="number" id="timeInput" placeholder="Time in seconds">

<button onclick="addTask()">+ Add Task</button>

</div>

</div>

<div class="filter-buttons">

<button class="active" onclick="filterTasks('all')">All</button>

<button onclick="filterTasks('pending')">Pending</button>

<button onclick="filterTasks('done')">Done</button>

<button onclick="filterTasks('expired')">Expired</button>

</div>

<div class="task-list" id="taskList"></div>

<button class="btn undo-btn" onclick="undoDelete()">
Undo Delete
</button>

<div class="structure">

<div class="structure-box">

<h3>🔗 LINKED LIST STRUCTURE</h3>

<div id="linkedList"></div>

</div>

<div class="structure-box">

<h3>📦 STACK STRUCTURE</h3>

<div id="stackList"></div>

</div>

</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let deletedStack = [];
let filter = "all";

function saveTasks(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function updateStats(){

    let total = tasks.length;
    let done = tasks.filter(t => t.status === "done").length;
    let pending = tasks.filter(t => t.status === "pending").length;
    let expired = tasks.filter(t => t.status === "expired").length;

    document.getElementById("total").innerText = total;
    document.getElementById("done").innerText = done;
    document.getElementById("pending").innerText = pending;
    document.getElementById("expired").innerText = expired;
}

function addTask(){

    let text = document.getElementById("taskInput").value;
    let time = parseInt(document.getElementById("timeInput").value);

    if(text === "" || isNaN(time)){
        alert("Enter task and time");
        return;
    }

    let task = {
        id: Date.now(),
        text: text,
        time: time,
        status: "pending",
        created: new Date().toLocaleTimeString()
    };

    tasks.push(task);

    document.getElementById("taskInput").value = "";
    document.getElementById("timeInput").value = "";

    startTimer(task.id);

    saveTasks();
    renderTasks();
}

function startTimer(id){

    let interval = setInterval(() => {

        let task = tasks.find(t => t.id === id);

        if(!task){
            clearInterval(interval);
            return;
        }

        if(task.status === "done"){
            clearInterval(interval);
            return;
        }

        task.time--;

        if(task.time <= 0){
            task.status = "expired";
            clearInterval(interval);
        }

        saveTasks();
        renderTasks();

    },1000);
}

function renderTasks(){

    let list = document.getElementById("taskList");

    list.innerHTML = "";

    let filteredTasks = tasks.filter(task => {

        if(filter === "all") return true;

        return task.status === filter;

    });

    filteredTasks.forEach(task => {

        let div = document.createElement("div");

        div.className = "task-item";

        div.innerHTML = `

        <div class="task-info">
            <h3>${task.text}</h3>
            <p>Time Left: ${task.time}s | Status: ${task.status}</p>
        </div>

        <div class="task-actions">

            <button class="btn done-btn"
            onclick="markDone(${task.id})">
            Done
            </button>

            <button class="btn delete-btn"
            onclick="deleteTask(${task.id})">
            Delete
            </button>

        </div>

        `;

        list.appendChild(div);

    });

    updateStats();
    renderLinkedList();
    renderStack();
}

function markDone(id){

    let task = tasks.find(t => t.id === id);

    if(task){
        task.status = "done";
    }

    saveTasks();
    renderTasks();
}

function deleteTask(id){

    let index = tasks.findIndex(t => t.id === id);

    if(index !== -1){

        deletedStack.push(tasks[index]);

        tasks.splice(index,1);

    }

    saveTasks();
    renderTasks();
}

function undoDelete(){

    if(deletedStack.length > 0){

        let task = deletedStack.pop();

        tasks.push(task);

        startTimer(task.id);

        saveTasks();
        renderTasks();

    }

}

function renderLinkedList(){

    let linked = document.getElementById("linkedList");

    linked.innerHTML = "";

    let head = document.createElement("span");

    head.className = "node";

    head.innerText = "HEAD";

    linked.appendChild(head);

    tasks.forEach(task => {

        let arrow = document.createElement("span");
        arrow.className = "arrow";
        arrow.innerText = "→";

        linked.appendChild(arrow);

        let node = document.createElement("span");
        node.className = "node";
        node.innerText = task.text;

        linked.appendChild(node);

    });

    let arrow = document.createElement("span");
    arrow.className = "arrow";
    arrow.innerText = "→";

    linked.appendChild(arrow);

    let nullNode = document.createElement("span");
    nullNode.className = "node";
    nullNode.innerText = "NULL";

    linked.appendChild(nullNode);
}

function renderStack(){

    let stack = document.getElementById("stackList");

    stack.innerHTML = "";

    deletedStack.slice().reverse().forEach(task => {

        let node = document.createElement("span");

        node.className = "node";

        node.innerText = task.text;

        stack.appendChild(node);

    });

}

function filterTasks(type){

    filter = type;

    document.querySelectorAll(".filter-buttons button")
    .forEach(btn => btn.classList.remove("active"));

    event.target.classList.add("active");

    renderTasks();
}

tasks.forEach(task => {

    if(task.status === "pending"){
        startTimer(task.id);
    }

});

renderTasks();

</script>

</body>
</html>
